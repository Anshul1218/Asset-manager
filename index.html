<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ELITE Earning Manager</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #e4c57a 0%, #fdf2d1 100%);
            background-attachment: fixed; 
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        
        .auth-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(0, 0, 0, 0.85);
            z-index: 10000;
            display: none; 
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(5px);
        }
        .auth-box {
            background: white;
            padding: 30px;
            border-radius: 12px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            max-width: 90%;
            width: 320px;
            border: 2px solid #b59410;
        }
        .auth-box h2 {
            margin-top: 0;
            color: #1a1a1a;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 20px;
        }
        .auth-box input {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            font-size: 16px;
            border: 1px solid #ddd;
            border-radius: 6px;
            box-sizing: border-box;
        }
        .auth-box input:focus {
            border-color: #b59410;
            outline: none;
            box-shadow: 0 0 0 2px rgba(181, 148, 16, 0.2);
        }
        .auth-btn {
            width: 100%;
            padding: 12px;
            background: #b59410;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 15px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .auth-btn:hover { background: #967a0c; }
        .cancel-btn {
            width: 100%;
            padding: 10px;
            background: transparent;
            color: #888;
            border: none;
            cursor: pointer;
            margin-top: 5px;
            font-size: 14px;
        }
        .cancel-btn:hover { color: #dc3545; }

        .elite-container {
            background: white;
            padding: 0;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15); 
            width: 100%;
            max-width: 900px;
            overflow: hidden; 
        }
        .app-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background-color: #1a1a1a; 
            color: #f0f2f5;
            padding: 20px 30px;
            border-top-left-radius: 12px;
            border-top-right-radius: 12px;
            margin: 0;
            border-bottom: 3px solid #b59410; 
        }
        
        .header-title-area {
            display: flex;
            flex-direction: column;
        }
        
        .app-header h1 {
            margin: 0;
            color: #f0f2f5;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: 800;
            font-size: 24px;
        }

        .lock-btn {
            background: transparent;
            color: #b59410;
            border: 1px solid #b59410;
            padding: 4px 10px;
            border-radius: 4px;
            font-size: 12px;
            cursor: pointer;
            margin-top: 5px;
            width: fit-content;
        }

        .lock-btn:hover {
            background: #b59410;
            color: #1a1a1a;
        }

        .logo-frame {
            width: 70px;
            height: 70px;
            border: 2px solid #b59410; 
            border-radius: 8px; 
            overflow: hidden;
            box-shadow: 0 0 10px rgba(212, 175, 55, 0.4); 
            background-color: #1a1a1a;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .header-logo {
            width: 100%;
            height: 100%;
            object-fit: contain; 
        }
        .content-area {
            padding: 30px;
        }
        form {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            margin-bottom: 30px;
            background-color: #f9f9f9;
            padding: 20px;
            border-radius: 8px;
        }
        .input-group {
            flex: 1 1 calc(33.333% - 15px); 
            display: flex;
            flex-direction: column;
        }
        .photo-group {
            flex: 1 1 100%; 
        }
        label {
            font-size: 14px;
            font-weight: 600;
            color: #b59410; 
            margin-bottom: 5px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        input[type="text"], input[type="number"], input[type="date"], input[type="time"] {
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 14px;
        }
        button.submit-btn {
            padding: 12px 20px;
            background-color: #28a745; 
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            width: 100%;
            font-size: 16px;
            font-weight: 600;
            margin-top: 10px;
            transition: all 0.2s;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        button.submit-btn:hover {
            background-color: #218838;
            box-shadow: 0 0 10px rgba(40, 167, 69, 0.4); 
        }
        table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0;
            margin-top: 20px;
        }
        th, td {
            padding: 15px;
            text-align: left;
            border-bottom: 1px solid #eee;
            vertical-align: middle;
        }
        th {
            background-color: #f8f9fa;
            font-weight: 700;
            color: #333;
            text-transform: uppercase;
            font-size: 12px;
            letter-spacing: 1px;
        }
        .tournament-img {
            width: 50px;
            height: 50px;
            object-fit: cover;
            border-radius: 8px;
            border: 1px solid #eee;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .tournament-img:hover {
            transform: scale(1.1);
        }
        .balance-container {
            margin-top: 20px;
            font-size: 24px;
            font-weight: 800;
            text-align: right;
            padding: 20px;
            background-color: #1a1a1a; 
            color: white;
            border-radius: 8px;
            border: 2px solid #b59410; 
        }
        .positive { color: #2ecc71; } 
        .negative { color: #e74c3c; } 
        .live-preview-text {
            font-size: 14px;
            color: #aaa;
            font-weight: normal;
            display: block;
            margin-bottom: 5px;
        }
        .delete-btn {
            background-color: transparent;
            color: #dc3545;
            border: 1px solid #dc3545;
            padding: 6px 12px;
            border-radius: 4px;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .delete-btn:hover {
            background-color: #dc3545;
            color: white;
        }
        .modal {
            display: none;
            position: fixed;
            z-index: 10000; 
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.85);
            justify-content: center;
            align-items: center;
        }
        .modal-content {
            max-width: 90%;
            max-height: 85vh;
            border-radius: 8px;
            box-shadow: 0 5px 25px rgba(0,0,0,0.5);
        }
        .close-btn {
            position: absolute;
            top: 20px;
            right: 30px;
            color: white;
            font-size: 40px;
            font-weight: bold;
            cursor: pointer;
        }
        .time-text {
            font-size: 12px;
            color: #777;
            display: block;
            margin-top: 2px;
        }
        @media (max-width: 768px) {
            .app-header {
                flex-direction: column-reverse;
                align-items: center;
                gap: 10px;
                padding: 15px 20px;
            }
            .app-header h1 {
                font-size: 18px;
                text-align: center;
            }
            .header-title-area {
                align-items: center;
            }
            .input-group {
                flex: 1 1 calc(50% - 15px);
            }
        }
    </style>
</head>
<body>

<div id="authModal" class="auth-overlay">
    <div class="auth-box">
        <h2>Admin Login</h2>
        <img src="https://i.ibb.co/m5BMQwRc/file-00000000e07c71fa8df812eac4409503.png" alt="MCL ELITE Logo" style="width: 60px; margin-bottom: 15px; border-radius: 6px; border: 1px solid #b59410;">
        <input type="text" id="usernameInput" placeholder="Username">
        <input type="password" id="passwordInput" placeholder="Password" inputmode="numeric" pattern="[0-9]*">
        <button class="auth-btn" id="loginExecuteBtn">Login</button>
        <button class="cancel-btn" id="loginCancelBtn">Cancel</button>
    </div>
</div>

<div class="elite-container">
    <div class="app-header">
        <div class="header-title-area">
            <h1>ELITE Earning Manager</h1>
            <button id="adminToggleBtn" class="lock-btn">Admin Login</button>
        </div>
        <div class="logo-frame">
            <img src="https://i.ibb.co/m5BMQwRc/file-00000000e07c71fa8df812eac4409503.png" alt="MCL ELITE Logo" class="header-logo">
        </div>
    </div>
    
    <div class="content-area">
        <form id="tournamentForm">
            <div class="input-group photo-group">
                <label for="photo">Tournament Screenshot (Proof)</label>
                <input type="file" id="photo" accept="image/*">
            </div>
            <div class="input-group">
                <label for="tournamentName">Tournament Name</label>
                <input type="text" id="tournamentName" placeholder="e.g., Weekly Apex Cup" required>
            </div>
            <div class="input-group">
                <label for="date">Date Played</label>
                <input type="date" id="date" required>
            </div>
            <div class="input-group">
                <label for="time">Time</label>
                <input type="time" id="time" required>
            </div>
            <div class="input-group">
                <label for="entryFee">Entry Fee (₹)</label>
                <input type="number" id="entryFee" step="1" min="0" placeholder="0" required>
            </div>
            <div class="input-group">
                <label for="prizeWon">Prize Won (₹)</label>
                <input type="number" id="prizeWon" step="1" min="0" placeholder="0" required>
            </div>
            <button type="submit" class="submit-btn" id="mainSubmitBtn">Add to Records</button>
        </form>

        <div class="balance-container">
            <span class="live-preview-text">Live Team Earnings:</span>
            <span id="totalBalance" class="positive">₹0</span>
        </div>

        <table>
            <thead>
                <tr>
                    <th>Proof</th>
                    <th>Tournament Name</th>
                    <th>Date & Time</th>
                    <th>Fee</th>
                    <th>Prize</th>
                    <th>Net</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody id="recordList">
            </tbody>
        </table>
    </div>
</div>

<div id="imageModal" class="modal">
    <span class="close-btn" id="modalCloseBtn">&times;</span>
    <img class="modal-content" id="fullSizeImage">
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
    import { getDatabase, ref, push, onValue, remove } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";

    // --- System Check: Let user know JS loaded ---
    const mainSubmitBtn = document.getElementById('mainSubmitBtn');
    mainSubmitBtn.textContent = "System Ready - Add Records";
    mainSubmitBtn.style.backgroundColor = "#20c997"; // Flash a different green to prove it loaded

    const ADMIN_USERNAME = "Professor";
    const ADMIN_PASSWORD = "121205";

    let isAdminLoggedIn = false;
    try {
        if (window.localStorage && localStorage.getItem('eliteAdminState') === 'true') {
            isAdminLoggedIn = true;
        }
    } catch (e) {
        console.warn("Storage restricted by browser.");
    }

    const adminToggleBtn = document.getElementById('adminToggleBtn');
    const authModal = document.getElementById('authModal');
    const loginExecuteBtn = document.getElementById('loginExecuteBtn');
    const loginCancelBtn = document.getElementById('loginCancelBtn');
    const imageModal = document.getElementById('imageModal');
    const modalCloseBtn = document.getElementById('modalCloseBtn');
    const fullSizeImage = document.getElementById('fullSizeImage');
    const recordList = document.getElementById('recordList');
    const form = document.getElementById('tournamentForm');
    const balanceDisplay = document.getElementById('totalBalance');
    const entryFeeInput = document.getElementById('entryFee');
    const prizeWonInput = document.getElementById('prizeWon');

    if (isAdminLoggedIn) {
        adminToggleBtn.textContent = "Logout Admin";
    }

    // --- Hardwired Event Listeners (Bypasses HTML Blocks) ---

    function openAuth() {
        authModal.style.display = 'flex';
    }

    function closeAuth() {
        authModal.style.display = 'none';
        document.getElementById('usernameInput').value = '';
        document.getElementById('passwordInput').value = '';
    }

    loginExecuteBtn.addEventListener('click', () => {
        const u = document.getElementById('usernameInput').value;
        const p = document.getElementById('passwordInput').value;
        
        if (u === ADMIN_USERNAME && p === ADMIN_PASSWORD) {
            isAdminLoggedIn = true;
            try { localStorage.setItem('eliteAdminState', 'true'); } catch(e){}
            adminToggleBtn.textContent = "Logout Admin";
            closeAuth();
            alert("Admin Access Granted! You can now save or delete records.");
        } else {
            alert("Incorrect Username or Password!");
        }
    });

    loginCancelBtn.addEventListener('click', closeAuth);

    adminToggleBtn.addEventListener('click', () => {
        if (isAdminLoggedIn) {
            isAdminLoggedIn = false;
            try { localStorage.removeItem('eliteAdminState'); } catch(e){}
            adminToggleBtn.textContent = "Admin Login";
            alert("You have safely logged out.");
        } else {
            openAuth();
        }
    });

    imageModal.addEventListener('click', () => {
        imageModal.style.display = "none";
    });

    modalCloseBtn.addEventListener('click', (e) => {
        imageModal.style.display = "none";
        e.stopPropagation();
    });

    function updateLiveBalance() {
        const currentEntryFee = parseInt(entryFeeInput.value) || 0;
        const currentPrizeWon = parseInt(prizeWonInput.value) || 0;
        const liveBalance = savedBalance - currentEntryFee + currentPrizeWon;

        balanceDisplay.textContent = `₹${liveBalance.toLocaleString('en-IN')}`;
        balanceDisplay.className = liveBalance >= 0 ? 'positive' : 'negative';
    }

    entryFeeInput.addEventListener('input', updateLiveBalance);
    prizeWonInput.addEventListener('input', updateLiveBalance);

    // Dynamic clicks inside the table (for deleting and expanding images)
    recordList.addEventListener('click', (e) => {
        if (e.target.classList.contains('delete-btn')) {
            if (!isAdminLoggedIn) {
                openAuth();
                return; 
            }
            if (confirm("Are you sure you want to remove this record? Everyone will see it removed.")) {
                const recordId = e.target.getAttribute('data-id');
                remove(ref(db, 'tournaments/' + recordId)); 
            }
        } else if (e.target.classList.contains('tournament-img')) {
            imageModal.style.display = "flex";
            fullSizeImage.src = e.target.getAttribute('data-src');
        }
    });

    const firebaseConfig = {
      apiKey: "AIzaSyAHoY4kVpeVuh6HWZ6ZSfgIe8QsjlYSt10",
      authDomain: "elite-earning-manager.firebaseapp.com",
      projectId: "elite-earning-manager",
      storageBucket: "elite-earning-manager.firebasestorage.app",
      messagingSenderId: "235331806399",
      appId: "1:235331806399:web:a6fcea8f2c16800ef4920a",
      databaseURL: "https://elite-earning-manager-default-rtdb.firebaseio.com"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const recordsRef = ref(db, 'tournaments');

    let savedBalance = 0;

    onValue(recordsRef, (snapshot) => {
        const data = snapshot.val();
        let localRecordsArray = [];
        savedBalance = 0;
        recordList.innerHTML = ''; 

        if (data) {
            for (let id in data) {
                localRecordsArray.push({ id: id, ...data[id] });
            }

            localRecordsArray.sort((a, b) => new Date(b.date + ' ' + b.time) - new Date(a.date + ' ' + a.time));

            localRecordsArray.forEach((record) => {
                const net = record.prizeWon - record.entryFee;
                savedBalance += net; 

                let photoHtml = '<span style="color:#ccc; font-size:11px;">No Proof</span>';
                if (record.photoBase64) {
                    photoHtml = `<img src="${record.photoBase64}" class="tournament-img" alt="Proof" data-src="${record.photoBase64}">`;
                }

                const tName = record.tournamentName || "Unnamed Tournament";
                const dateObj = new Date(record.date);
                const formattedDate = dateObj.toLocaleDateString('en-IN', { day: 'numeric', month: 'short', year: 'numeric' });
                const tTime = record.time ? `<span class="time-text">${record.time}</span>` : "";

                const newRow = document.createElement('tr');
                newRow.innerHTML = `
                    <td>${photoHtml}</td>
                    <td><strong>${tName}</strong></td>
                    <td>${formattedDate} ${tTime}</td>
                    <td>₹${record.entryFee.toLocaleString('en-IN')}</td>
                    <td>₹${record.prizeWon.toLocaleString('en-IN')}</td>
                    <td class="${net >= 0 ? 'positive' : 'negative'}"><strong>₹${net.toLocaleString('en-IN')}</strong></td>
                    <td><button class="delete-btn" data-id="${record.id}">Delete</button></td>
                `;
                recordList.appendChild(newRow);
            });
        }
        updateLiveBalance();
    });

    form.addEventListener('submit', function(event) {
        event.preventDefault();

        if (!isAdminLoggedIn) {
            openAuth();
            return; 
        }

        const submitBtn = form.querySelector('.submit-btn');
        submitBtn.textContent = "Saving...";
        sub
